<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Status</title>
  <style>
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #e9eef2;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
    .box {
      width: min(640px, 92vw);
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #cfd5da;
    }
    h2 { margin-top: 0; }
    .ok { color: #1f6e3c; }
    .err { color: #a22f2f; }
    a {
      display: inline-block;
      margin-top: 14px;
      color: #1d6380;
      text-decoration: none;
      font-weight: 600;
      margin-right: 14px;
    }
  </style>
</head>
<body>
  <div class="box">
    {% if success %}
      <h2 class="ok">Success</h2>
    {% else %}
      <h2 class="err">Error</h2>
    {% endif %}
    <p>{{ message }}</p>
  </div>
</body>
</html>
